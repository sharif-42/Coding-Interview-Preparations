<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="18" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Reverse Proxy</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">Server-side proxy — hides server identity from clients</text>

  <!-- Client -->
  <rect x="30" y="150" width="120" height="100" rx="14" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="90" y="193" text-anchor="middle" font-size="14" font-weight="600" fill="#0369a1">🖥️ Client</text>
  <text x="90" y="214" text-anchor="middle" font-size="10" fill="#0284c7">Sees proxy IP only</text>

  <!-- Arrow: Client → Internet -->
  <line x1="150" y1="200" x2="220" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Internet Cloud -->
  <ellipse cx="270" cy="200" rx="45" ry="35" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="270" y="196" text-anchor="middle" font-size="13" fill="#475569">🌐</text>
  <text x="270" y="213" text-anchor="middle" font-size="12" fill="#475569">Internet</text>

  <!-- Arrow: Internet → Reverse Proxy -->
  <line x1="315" y1="200" x2="390" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="353" y="190" text-anchor="middle" font-size="11" fill="#64748b">requests</text>

  <!-- Reverse Proxy Box -->
  <rect x="400" y="130" width="180" height="140" rx="14" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#shadow2)"/>
  <text x="490" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">🛡️ Reverse</text>
  <text x="490" y="197" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Proxy</text>
  <text x="490" y="222" text-anchor="middle" font-size="10" fill="#7c3aed">SSL · Cache · Route · Protect</text>
  <text x="490" y="252" text-anchor="middle" font-size="10" fill="#7c3aed">e.g. Nginx, HAProxy, Traefik</text>

  <!-- Arrows: Reverse Proxy → Servers -->
  <line x1="580" y1="170" x2="680" y2="138" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="580" y1="200" x2="680" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="580" y1="230" x2="680" y2="262" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Servers Group -->
  <rect x="680" y="85" width="190" height="215" rx="14" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="775" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Backend Servers</text>

  <rect x="700" y="123" width="150" height="36" rx="8" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="775" y="147" text-anchor="middle" font-size="13" fill="#166534">🖧 Server 1</text>

  <rect x="700" y="170" width="150" height="36" rx="8" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="775" y="194" text-anchor="middle" font-size="13" fill="#166534">🖧 Server 2</text>

  <rect x="700" y="217" width="150" height="36" rx="8" fill="#fff" stroke="#86efac" stroke-width="1"/>
  <text x="775" y="241" text-anchor="middle" font-size="13" fill="#166534">🖧 Server 3</text>

  <text x="775" y="280" text-anchor="middle" font-size="10" fill="#15803d">IPs hidden from clients</text>

  <!-- Labels -->
  <text x="90" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">✗ Client doesn't know</text>
  <text x="90" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">the real servers</text>
  <text x="490" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">✓ Servers know the proxy</text>
</svg>