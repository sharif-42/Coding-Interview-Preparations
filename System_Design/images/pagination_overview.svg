<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgPO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="poB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="poG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="poA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="poP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="960" height="500" rx="12" fill="url(#bgPO)"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Pagination Overview — Why Paginate?</text>

  <!-- ===== WITHOUT PAGINATION (top) ===== -->
  <text x="240" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Without Pagination</text>

  <!-- Client -->
  <rect x="30" y="85" width="120" height="50" rx="8" fill="#3b82f6"/>
  <text x="90" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Client</text>

  <!-- Arrow -->
  <line x1="150" y1="104" x2="185" y2="104" stroke="#3b82f6" stroke-width="2" marker-end="url(#poB)"/>
  <text x="168" y="96" text-anchor="middle" font-size="7" fill="#475569">GET /products</text>

  <!-- Server -->
  <rect x="188" y="85" width="120" height="50" rx="8" fill="#f59e0b"/>
  <text x="248" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">API Server</text>

  <!-- Arrow -->
  <line x1="308" y1="104" x2="343" y2="104" stroke="#f59e0b" stroke-width="2" marker-end="url(#poA)"/>

  <!-- Database -->
  <rect x="346" y="80" width="120" height="60" rx="8" fill="#6366f1"/>
  <text x="406" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>
  <text x="406" y="122" text-anchor="middle" font-size="8" fill="#e0e7ff">SELECT * FROM ...</text>

  <!-- Bad response arrow -->
  <path d="M 346 130 Q 248 175 150 130" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#poB)" stroke-dasharray="5,3"/>

  <!-- Bad response box -->
  <rect x="30" y="145" width="435" height="65" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="248" y="165" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">2,000,000 rows returned at once</text>
  <text x="248" y="182" text-anchor="middle" font-size="9" fill="#991b1b">~800MB JSON | 45s to serialize | 2min to transfer</text>
  <text x="248" y="197" text-anchor="middle" font-size="9" fill="#991b1b">Browser crashes | Server OOM | Database locks</text>

  <!-- ===== WITH PAGINATION (bottom) ===== -->
  <text x="240" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">With Pagination</text>

  <!-- Client -->
  <rect x="30" y="262" width="120" height="50" rx="8" fill="#3b82f6"/>
  <text x="90" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Client</text>

  <!-- Arrow -->
  <line x1="150" y1="280" x2="185" y2="280" stroke="#3b82f6" stroke-width="2" marker-end="url(#poB)"/>
  <text x="168" y="273" text-anchor="middle" font-size="6" fill="#475569">?page=1&amp;size=20</text>

  <!-- Server -->
  <rect x="188" y="262" width="120" height="50" rx="8" fill="#f59e0b"/>
  <text x="248" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">API Server</text>

  <!-- Arrow -->
  <line x1="308" y1="280" x2="343" y2="280" stroke="#f59e0b" stroke-width="2" marker-end="url(#poA)"/>
  <text x="326" y="273" text-anchor="middle" font-size="6" fill="#475569">LIMIT 20</text>

  <!-- Database -->
  <rect x="346" y="257" width="120" height="60" rx="8" fill="#6366f1"/>
  <text x="406" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>
  <text x="406" y="299" text-anchor="middle" font-size="7" fill="#e0e7ff">LIMIT 20 OFFSET 0</text>

  <!-- Good response arrow -->
  <path d="M 346 307 Q 248 345 150 307" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#poB)"/>

  <!-- Good response box -->
  <rect x="30" y="320" width="435" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="248" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">20 rows returned with metadata</text>
  <text x="248" y="357" text-anchor="middle" font-size="9" fill="#166534">~8KB JSON | 2ms to serialize | 50ms to transfer</text>
  <text x="248" y="370" text-anchor="middle" font-size="9" fill="#166534">Instant render | Low memory | Fast indexed query</text>

  <!-- ===== RIGHT SIDE: Response structure ===== -->
  <rect x="510" y="75" width="420" height="310" rx="10" fill="#1e293b"/>
  <text x="530" y="100" font-size="12" font-weight="600" fill="#10b981">// Paginated API Response</text>
  <text x="530" y="120" font-size="11" fill="#e2e8f0">{</text>
  <text x="550" y="140" font-size="11" fill="#93c5fd">"count"</text><text x="616" y="140" font-size="11" fill="#e2e8f0">: </text><text x="628" y="140" font-size="11" fill="#fbbf24">15230</text><text x="670" y="140" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="160" font-size="11" fill="#93c5fd">"page"</text><text x="609" y="160" font-size="11" fill="#e2e8f0">: </text><text x="621" y="160" font-size="11" fill="#fbbf24">3</text><text x="632" y="160" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="180" font-size="11" fill="#93c5fd">"page_size"</text><text x="644" y="180" font-size="11" fill="#e2e8f0">: </text><text x="656" y="180" font-size="11" fill="#fbbf24">20</text><text x="674" y="180" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="200" font-size="11" fill="#93c5fd">"total_pages"</text><text x="665" y="200" font-size="11" fill="#e2e8f0">: </text><text x="677" y="200" font-size="11" fill="#fbbf24">762</text><text x="703" y="200" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="220" font-size="11" fill="#93c5fd">"next"</text><text x="609" y="220" font-size="11" fill="#e2e8f0">: </text><text x="621" y="220" font-size="11" fill="#fca5a5">"...?page=4"</text><text x="720" y="220" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="240" font-size="11" fill="#93c5fd">"previous"</text><text x="637" y="240" font-size="11" fill="#e2e8f0">: </text><text x="649" y="240" font-size="11" fill="#fca5a5">"...?page=2"</text><text x="748" y="240" font-size="11" fill="#e2e8f0">,</text>
  <text x="550" y="260" font-size="11" fill="#93c5fd">"results"</text><text x="630" y="260" font-size="11" fill="#e2e8f0">: [</text>
  <text x="570" y="280" font-size="10" fill="#6ee7b7">{"id": 41, "name": "..."}</text><text x="772" y="280" font-size="11" fill="#e2e8f0">,</text>
  <text x="570" y="298" font-size="10" fill="#6ee7b7">{"id": 42, "name": "..."}</text>
  <text x="570" y="316" font-size="10" fill="#475569">... 18 more items</text>
  <text x="550" y="336" font-size="11" fill="#e2e8f0">]</text>
  <text x="530" y="356" font-size="11" fill="#e2e8f0">}</text>

  <!-- Labels -->
  <line x1="720" y1="135" x2="800" y2="135" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="808" y="139" font-size="8" fill="#fbbf24">Total items</text>

  <line x1="632" y1="155" x2="800" y2="155" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="808" y="159" font-size="8" fill="#fbbf24">Current page</text>

  <line x1="720" y1="215" x2="800" y2="195" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="808" y="199" font-size="8" fill="#fca5a5">Navigation links</text>

  <!-- Bottom comparison -->
  <rect x="30" y="400" width="900" height="85" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Impact Summary</text>
  
  <text x="120" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Metric</text>
  <text x="310" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No Pagination</text>
  <text x="510" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Paginated (20/page)</text>
  <text x="720" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Improvement</text>
  
  <line x1="50" y1="455" x2="910" y2="455" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="120" y="474" text-anchor="middle" font-size="9" fill="#475569">Response Size</text>
  <text x="310" y="474" text-anchor="middle" font-size="9" fill="#dc2626">~800 MB</text>
  <text x="510" y="474" text-anchor="middle" font-size="9" fill="#10b981">~8 KB</text>
  <text x="720" y="474" text-anchor="middle" font-size="9" font-weight="700" fill="#3b82f6">100,000x smaller</text>
</svg>
