<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aGW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="aGWb" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="aGWg" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="sGW" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="520" rx="18" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">API Gateway — Single Entry Point for Microservices</text>
  <text x="480" y="55" text-anchor="middle" font-size="12" fill="#64748b">All client requests flow through the gateway — routing, auth, rate limiting, and logging happen in one place</text>

  <!-- CLIENTS -->
  <rect x="20" y="80" width="160" height="250" rx="14" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#sGW)"/>
  <text x="100" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">Clients</text>

  <rect x="35" y="118" width="130" height="36" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="141" text-anchor="middle" font-size="12" fill="#1e3a5f">📱 Mobile App</text>

  <rect x="35" y="164" width="130" height="36" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="187" text-anchor="middle" font-size="12" fill="#1e3a5f">🌐 Web App</text>

  <rect x="35" y="210" width="130" height="36" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="233" text-anchor="middle" font-size="12" fill="#1e3a5f">🔗 Partner API</text>

  <rect x="35" y="256" width="130" height="36" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="279" text-anchor="middle" font-size="12" fill="#1e3a5f">🤖 IoT Device</text>

  <!-- Arrow: Clients → Gateway -->
  <line x1="180" y1="205" x2="275" y2="205" stroke="#2563eb" stroke-width="3" marker-end="url(#aGWb)"/>
  <text x="228" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">HTTPS</text>

  <!-- API GATEWAY -->
  <rect x="285" y="72" width="260" height="380" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#sGW)"/>
  <text x="415" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">🚪 API Gateway</text>
  <text x="415" y="118" text-anchor="middle" font-size="10" fill="#a16207">api.fooddash.com · 203.0.113.200</text>

  <line x1="300" y1="128" x2="530" y2="128" stroke="#fbbf24" stroke-width="0.8"/>

  <!-- Plugin chain -->
  <rect x="300" y="138" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">① SSL/TLS Termination</text>

  <rect x="300" y="172" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">② Authentication (JWT / API Key)</text>

  <rect x="300" y="206" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">③ Rate Limiting (100 req/min)</text>

  <rect x="300" y="240" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="259" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">④ Request Validation</text>

  <rect x="300" y="274" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="293" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">⑤ Route Matching</text>

  <rect x="300" y="308" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="327" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">⑥ Load Balancing</text>

  <rect x="300" y="342" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">⑦ Circuit Breaking</text>

  <rect x="300" y="376" width="230" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="415" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">⑧ Logging &amp; Metrics</text>

  <text x="415" y="433" text-anchor="middle" font-size="10" fill="#92400e">Kong · AWS API GW · Nginx · Traefik</text>

  <!-- MICROSERVICES -->
  <rect x="630" y="72" width="310" height="380" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1" filter="url(#sGW)"/>
  <text x="785" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Microservices (Private Network)</text>

  <rect x="650" y="112" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="137" text-anchor="middle" font-size="12" fill="#166534">👤 User Service — user-svc:8001</text>

  <rect x="650" y="162" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="187" text-anchor="middle" font-size="12" fill="#166534">🍕 Restaurant Service — restaurant-svc:8002</text>

  <rect x="650" y="212" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="237" text-anchor="middle" font-size="12" fill="#166534">📦 Order Service — order-svc:8003</text>

  <rect x="650" y="262" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="287" text-anchor="middle" font-size="12" fill="#166534">💳 Payment Service — payment-svc:8004</text>

  <rect x="650" y="312" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="337" text-anchor="middle" font-size="12" fill="#166534">🔔 Notification Service — notif-svc:8005</text>

  <rect x="650" y="362" width="270" height="40" rx="8" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="785" y="387" text-anchor="middle" font-size="12" fill="#166534">🚗 Delivery Service — delivery-svc:8006</text>

  <!-- Arrows: Gateway → Services -->
  <line x1="545" y1="155" x2="645" y2="132" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>
  <line x1="545" y1="192" x2="645" y2="182" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>
  <line x1="545" y1="230" x2="645" y2="232" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>
  <line x1="545" y1="268" x2="645" y2="282" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>
  <line x1="545" y1="330" x2="645" y2="332" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>
  <line x1="545" y1="370" x2="645" y2="382" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGWg)"/>

  <!-- Arrow labels -->
  <text x="590" y="122" font-size="9" fill="#16a34a">/api/v1/users</text>
  <text x="590" y="172" font-size="9" fill="#16a34a">/api/v1/restaurants</text>
  <text x="590" y="222" font-size="9" fill="#16a34a">/api/v1/orders</text>
  <text x="590" y="275" font-size="9" fill="#16a34a">/api/v1/payments</text>
  <text x="590" y="325" font-size="9" fill="#16a34a">/api/v1/notifications</text>
  <text x="590" y="378" font-size="9" fill="#16a34a">/api/v1/tracking</text>

  <!-- Bottom note -->
  <rect x="20" y="468" width="920" height="40" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="480" y="488" text-anchor="middle" font-size="11" fill="#475569">All cross-cutting concerns (auth, rate limiting, logging, SSL) are handled ONCE at the gateway — not duplicated across 6 services</text>
  <text x="480" y="502" text-anchor="middle" font-size="10" fill="#94a3b8">Backend services only handle business logic. They trust the gateway for identity (X-User-ID header).</text>
</svg>