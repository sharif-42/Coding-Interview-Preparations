<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="sB" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/>
    </marker>
    <marker id="sG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#10b981"/>
    </marker>
    <marker id="sR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#dc2626"/>
    </marker>
    <marker id="sA" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f59e0b"/>
    </marker>
    <marker id="sP" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1080" height="700" rx="12" fill="url(#bgS)"/>
  <text x="540" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">5 Caching Strategies Compared</text>

  <!-- ================== 1. CACHE-ASIDE ================== -->
  <g transform="translate(15, 50)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#3b82f6"/>
    <rect y="20" width="340" height="10" fill="#3b82f6"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1. Cache-Aside (Lazy Loading)</text>

    <!-- App -->
    <rect x="120" y="50" width="100" height="38" rx="6" fill="#f59e0b"/>
    <text x="170" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Application</text>

    <!-- Cache -->
    <rect x="20" y="150" width="90" height="38" rx="6" fill="#dc2626"/>
    <text x="65" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Cache</text>

    <!-- DB -->
    <rect x="230" y="150" width="90" height="38" rx="6" fill="#6366f1"/>
    <text x="275" y="174" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>

    <!-- Arrows -->
    <line x1="135" y1="88" x2="75" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#sB)"/>
    <text x="78" y="115" font-size="8" fill="#3b82f6">1. Read</text>
    <line x1="65" y1="150" x2="130" y2="88" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sR)"/>
    <text x="58" y="130" font-size="8" fill="#dc2626">2. Miss</text>
    <line x1="205" y1="88" x2="260" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#sP)"/>
    <text x="240" y="115" font-size="8" fill="#6366f1">3. Query</text>
    <line x1="230" y1="169" x2="110" y2="169" stroke="#10b981" stroke-width="1.5" marker-end="url(#sG)"/>
    <text x="160" y="163" font-size="8" fill="#10b981">4. Populate</text>

    <!-- Info box -->
    <rect x="15" y="200" width="310" height="50" rx="5" fill="#eff6ff"/>
    <text x="170" y="217" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">App manages cache + DB separately</text>
    <text x="170" y="232" text-anchor="middle" font-size="8" fill="#3730a3">Best for: Read-heavy, eventual consistency OK</text>
    <text x="170" y="244" text-anchor="middle" font-size="8" fill="#3730a3">Used by: Django cache, FastAPI manual</text>
  </g>

  <!-- ================== 2. READ-THROUGH ================== -->
  <g transform="translate(370, 50)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#10b981"/>
    <rect y="20" width="340" height="10" fill="#10b981"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2. Read-Through</text>

    <!-- App -->
    <rect x="120" y="50" width="100" height="38" rx="6" fill="#f59e0b"/>
    <text x="170" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Application</text>

    <!-- Cache -->
    <rect x="120" y="120" width="100" height="38" rx="6" fill="#dc2626"/>
    <text x="170" y="144" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Cache</text>

    <!-- DB -->
    <rect x="120" y="190" width="100" height="38" rx="6" fill="#6366f1"/>
    <text x="170" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>

    <!-- Arrows -->
    <line x1="170" y1="88" x2="170" y2="120" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#sB)"/>
    <text x="195" y="108" font-size="8" fill="#3b82f6">1. Read</text>
    <line x1="155" y1="158" x2="155" y2="190" stroke="#dc2626" stroke-width="1.5" marker-end="url(#sR)"/>
    <text x="115" y="178" font-size="8" fill="#dc2626">2. Miss: fetch</text>
    <line x1="185" y1="190" x2="185" y2="158" stroke="#10b981" stroke-width="1.5" marker-end="url(#sG)"/>
    <text x="210" y="178" font-size="8" fill="#10b981">3. Store</text>

    <!-- Info box -->
    <rect x="15" y="200" width="98" height="50" rx="5" fill="#f0fdf4"/>
    <text x="64" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">Cache loads</text>
    <text x="64" y="234" text-anchor="middle" font-size="8" fill="#166534">from DB</text>
    <text x="64" y="246" text-anchor="middle" font-size="8" fill="#166534">on miss</text>

    <rect x="228" y="200" width="98" height="50" rx="5" fill="#f0fdf4"/>
    <text x="277" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">Simpler</text>
    <text x="277" y="234" text-anchor="middle" font-size="8" fill="#166534">app code</text>
    <text x="277" y="246" text-anchor="middle" font-size="8" fill="#166534">vs Cache-Aside</text>
  </g>

  <!-- ================== 3. WRITE-THROUGH ================== -->
  <g transform="translate(725, 50)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#f59e0b"/>
    <rect y="20" width="340" height="10" fill="#f59e0b"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3. Write-Through</text>

    <!-- App -->
    <rect x="120" y="50" width="100" height="38" rx="6" fill="#f59e0b"/>
    <text x="170" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Application</text>

    <!-- Cache -->
    <rect x="120" y="120" width="100" height="38" rx="6" fill="#dc2626"/>
    <text x="170" y="144" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Cache</text>

    <!-- DB -->
    <rect x="120" y="190" width="100" height="38" rx="6" fill="#6366f1"/>
    <text x="170" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>

    <!-- Arrows (write goes through both) -->
    <line x1="170" y1="88" x2="170" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#sA)"/>
    <text x="195" y="108" font-size="8" fill="#f59e0b">1. Write</text>
    <line x1="170" y1="158" x2="170" y2="190" stroke="#f59e0b" stroke-width="2" marker-end="url(#sA)"/>
    <text x="195" y="178" font-size="8" fill="#f59e0b">2. Write</text>

    <!-- Sync label -->
    <rect x="240" y="130" width="80" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="280" y="145" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Synchronous</text>

    <!-- Info box -->
    <rect x="15" y="200" width="98" height="50" rx="5" fill="#fffbeb"/>
    <text x="64" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Strong</text>
    <text x="64" y="234" text-anchor="middle" font-size="8" fill="#92400e">consistency</text>

    <rect x="228" y="200" width="98" height="50" rx="5" fill="#fffbeb"/>
    <text x="277" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Slower</text>
    <text x="277" y="234" text-anchor="middle" font-size="8" fill="#92400e">writes</text>
    <text x="277" y="246" text-anchor="middle" font-size="8" fill="#92400e">(2x latency)</text>
  </g>

  <!-- ================== 4. WRITE-BEHIND ================== -->
  <g transform="translate(15, 380)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#6366f1"/>
    <rect y="20" width="340" height="10" fill="#6366f1"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4. Write-Behind (Write-Back)</text>

    <!-- App -->
    <rect x="120" y="50" width="100" height="38" rx="6" fill="#f59e0b"/>
    <text x="170" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Application</text>

    <!-- Cache -->
    <rect x="120" y="120" width="100" height="38" rx="6" fill="#dc2626"/>
    <text x="170" y="144" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Cache</text>

    <!-- DB -->
    <rect x="120" y="210" width="100" height="38" rx="6" fill="#6366f1"/>
    <text x="170" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>

    <!-- Arrows -->
    <line x1="170" y1="88" x2="170" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#sA)"/>
    <text x="195" y="108" font-size="8" fill="#f59e0b">1. Write</text>
    <line x1="170" y1="158" x2="170" y2="210" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sP)"/>
    <text x="195" y="188" font-size="8" fill="#6366f1">2. Async flush</text>

    <!-- Async label -->
    <rect x="240" y="170" width="85" height="24" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="283" y="186" text-anchor="middle" font-size="8" font-weight="600" fill="#4338ca">Asynchronous</text>

    <!-- Timer icon -->
    <text x="260" y="210" font-size="8" fill="#475569">Every N seconds</text>
    <text x="260" y="222" font-size="8" fill="#475569">or batch full</text>

    <!-- Info box -->
    <rect x="15" y="200" width="98" height="50" rx="5" fill="#eef2ff"/>
    <text x="64" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#4338ca">Fast writes</text>
    <text x="64" y="234" text-anchor="middle" font-size="8" fill="#4338ca">(responds</text>
    <text x="64" y="246" text-anchor="middle" font-size="8" fill="#4338ca">immediately)</text>
  </g>

  <!-- ================== 5. WRITE-AROUND ================== -->
  <g transform="translate(370, 380)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#dc2626"/>
    <rect y="20" width="340" height="10" fill="#dc2626"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5. Write-Around</text>

    <!-- App -->
    <rect x="120" y="50" width="100" height="38" rx="6" fill="#f59e0b"/>
    <text x="170" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Application</text>

    <!-- Cache (bypassed) -->
    <rect x="20" y="140" width="90" height="38" rx="6" fill="#dc2626" opacity="0.3"/>
    <rect x="20" y="140" width="90" height="38" rx="6" fill="none" stroke="#dc2626" stroke-dasharray="4,2" stroke-width="1.5"/>
    <text x="65" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Cache</text>
    <text x="65" y="175" text-anchor="middle" font-size="7" fill="#dc2626">(bypassed)</text>

    <!-- DB -->
    <rect x="230" y="140" width="90" height="38" rx="6" fill="#6366f1"/>
    <text x="275" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Database</text>

    <!-- Arrow: App directly to DB -->
    <line x1="200" y1="88" x2="258" y2="140" stroke="#6366f1" stroke-width="2" marker-end="url(#sP)"/>
    <text x="248" y="108" font-size="8" fill="#6366f1">1. Write to DB</text>

    <!-- Crossed-out path to cache -->
    <line x1="140" y1="88" x2="80" y2="140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="95" y1="100" x2="115" y2="125" stroke="#dc2626" stroke-width="2"/>
    <line x1="115" y1="100" x2="95" y2="125" stroke="#dc2626" stroke-width="2"/>

    <!-- Info box -->
    <rect x="15" y="200" width="310" height="50" rx="5" fill="#fef2f2"/>
    <text x="170" y="217" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">Write goes directly to DB, skipping cache</text>
    <text x="170" y="232" text-anchor="middle" font-size="8" fill="#7f1d1d">Best for: Write-heavy data rarely read after write</text>
    <text x="170" y="244" text-anchor="middle" font-size="8" fill="#7f1d1d">Example: Logs, audit trails, analytics events</text>
  </g>

  <!-- ================== COMPARISON BOX ================== -->
  <g transform="translate(725, 380)">
    <rect width="340" height="260" rx="10" fill="#fff" stroke="#475569" stroke-width="2"/>
    <rect width="340" height="30" rx="10" fill="#475569"/>
    <rect y="20" width="340" height="10" fill="#475569"/>
    <text x="170" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Quick Comparison</text>

    <!-- Table headers -->
    <text x="20" y="55" font-size="9" font-weight="700" fill="#334155">Strategy</text>
    <text x="140" y="55" font-size="9" font-weight="700" fill="#334155">Read</text>
    <text x="200" y="55" font-size="9" font-weight="700" fill="#334155">Write</text>
    <text x="265" y="55" font-size="9" font-weight="700" fill="#334155">Consistency</text>
    <line x1="15" y1="62" x2="325" y2="62" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Row 1 -->
    <text x="20" y="80" font-size="8" font-weight="600" fill="#3b82f6">Cache-Aside</text>
    <text x="140" y="80" font-size="8" fill="#334155">Fast</text>
    <text x="200" y="80" font-size="8" fill="#334155">Manual</text>
    <text x="265" y="80" font-size="8" fill="#f59e0b">Eventual</text>

    <!-- Row 2 -->
    <text x="20" y="100" font-size="8" font-weight="600" fill="#10b981">Read-Through</text>
    <text x="140" y="100" font-size="8" fill="#334155">Fast</text>
    <text x="200" y="100" font-size="8" fill="#334155">N/A</text>
    <text x="265" y="100" font-size="8" fill="#f59e0b">Eventual</text>

    <!-- Row 3 -->
    <text x="20" y="120" font-size="8" font-weight="600" fill="#f59e0b">Write-Through</text>
    <text x="140" y="120" font-size="8" fill="#334155">Fast</text>
    <text x="200" y="120" font-size="8" fill="#334155">Slower</text>
    <text x="265" y="120" font-size="8" fill="#10b981">Strong</text>

    <!-- Row 4 -->
    <text x="20" y="140" font-size="8" font-weight="600" fill="#6366f1">Write-Behind</text>
    <text x="140" y="140" font-size="8" fill="#334155">Fast</text>
    <text x="200" y="140" font-size="8" fill="#334155">Fastest</text>
    <text x="265" y="140" font-size="8" fill="#dc2626">Weak</text>

    <!-- Row 5 -->
    <text x="20" y="160" font-size="8" font-weight="600" fill="#dc2626">Write-Around</text>
    <text x="140" y="160" font-size="8" fill="#334155">Miss 1st</text>
    <text x="200" y="160" font-size="8" fill="#334155">Normal</text>
    <text x="265" y="160" font-size="8" fill="#10b981">Strong</text>

    <line x1="15" y1="170" x2="325" y2="170" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Recommendation -->
    <rect x="15" y="180" width="310" height="68" rx="5" fill="#f0fdf4"/>
    <text x="170" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">Most Common in Interviews:</text>
    <text x="170" y="215" text-anchor="middle" font-size="9" fill="#166534">Cache-Aside + Write-Through combo</text>
    <text x="170" y="232" text-anchor="middle" font-size="8" fill="#166534">Cache-Aside for reads (lazy load)</text>
    <text x="170" y="244" text-anchor="middle" font-size="8" fill="#166534">Write-Through for writes (strong consistency)</text>
  </g>

  <!-- Bottom note -->
  <text x="540" y="690" text-anchor="middle" font-size="9" fill="#64748b">Dashed arrows = asynchronous / eventual | Solid arrows = synchronous / immediate</text>
</svg>
