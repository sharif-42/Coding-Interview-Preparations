<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Rate Limiting Architecture — 5 Microservices + API Gateway</text>

  <!-- Clients Column -->
  <text x="90" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">CLIENTS</text>

  <!-- Client boxes -->
  <rect x="30" y="110" width="120" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="90" y="131" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Free Tier</text>
  <text x="90" y="148" text-anchor="middle" font-size="10" fill="#dbeafe">20 req/min</text>

  <rect x="30" y="180" width="120" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="90" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Pro Tier</text>
  <text x="90" y="218" text-anchor="middle" font-size="10" fill="#dbeafe">200 req/min</text>

  <rect x="30" y="250" width="120" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="90" y="271" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Enterprise</text>
  <text x="90" y="288" text-anchor="middle" font-size="10" fill="#dbeafe">2000 req/min</text>

  <rect x="30" y="320" width="120" height="50" rx="8" fill="#94a3b8" opacity="0.8"/>
  <text x="90" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Anonymous</text>
  <text x="90" y="358" text-anchor="middle" font-size="10" fill="#e2e8f0">IP-based limit</text>

  <!-- Arrows: clients to gateway -->
  <line x1="150" y1="135" x2="300" y2="260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="205" x2="300" y2="260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="275" x2="300" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="345" x2="300" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- API Gateway Box -->
  <rect x="300" y="100" width="200" height="380" rx="12" fill="url(#gwGrad)" opacity="0.95"/>
  <text x="400" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">API GATEWAY</text>
  <text x="400" y="150" text-anchor="middle" font-size="11" fill="#fef3c7">(Kong)</text>

  <!-- Gateway internals -->
  <rect x="320" y="168" width="160" height="36" rx="6" fill="#fff" opacity="0.25"/>
  <text x="400" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">1. Authentication</text>

  <rect x="320" y="214" width="160" height="36" rx="6" fill="#fff" opacity="0.4"/>
  <text x="400" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">2. RATE LIMITING</text>

  <rect x="320" y="260" width="160" height="36" rx="6" fill="#fff" opacity="0.25"/>
  <text x="400" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">3. Request Routing</text>

  <rect x="320" y="306" width="160" height="36" rx="6" fill="#fff" opacity="0.25"/>
  <text x="400" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">4. Load Balancing</text>

  <rect x="320" y="352" width="160" height="36" rx="6" fill="#fff" opacity="0.25"/>
  <text x="400" y="374" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">5. Logging</text>

  <!-- 429 rejection arrow -->
  <rect x="315" y="410" width="170" height="50" rx="8" fill="#dc2626" opacity="0.85"/>
  <text x="400" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">429 Too Many</text>
  <text x="400" y="448" text-anchor="middle" font-size="10" fill="#fecaca">Retry-After: 23s</text>

  <!-- Redis -->
  <rect x="320" y="510" width="160" height="55" rx="10" fill="url(#redisGrad)"/>
  <text x="400" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Redis</text>
  <text x="400" y="553" text-anchor="middle" font-size="10" fill="#fecaca">Shared counters + TTL</text>

  <!-- Arrow: gateway to redis -->
  <line x1="400" y1="400" x2="400" y2="510" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="440" y="475" font-size="10" fill="#64748b">Check/Incr</text>

  <!-- Microservices Column -->
  <text x="750" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">MICROSERVICES</text>

  <!-- Service 1: User -->
  <rect x="620" y="100" width="180" height="55" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="710" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">User Service :8001</text>
  <text x="710" y="142" text-anchor="middle" font-size="10" fill="#d1fae5">150 req/min per consumer</text>

  <!-- Service 2: Product -->
  <rect x="620" y="170" width="180" height="55" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="710" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Product Service :8002</text>
  <text x="710" y="212" text-anchor="middle" font-size="10" fill="#d1fae5">500 req/min per IP</text>

  <!-- Service 3: Order -->
  <rect x="620" y="240" width="180" height="55" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="710" y="263" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Order Service :8003</text>
  <text x="710" y="282" text-anchor="middle" font-size="10" fill="#d1fae5">200 req/min per consumer</text>

  <!-- Service 4: Payment -->
  <rect x="620" y="310" width="180" height="55" rx="8" fill="#059669" opacity="0.9"/>
  <rect x="620" y="310" width="180" height="55" rx="8" fill="#dc2626" opacity="0.15"/>
  <text x="710" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Payment Service :8004</text>
  <text x="710" y="352" text-anchor="middle" font-size="10" fill="#fef2f2">50 req/min (STRICT)</text>

  <!-- Service 5: Notification -->
  <rect x="620" y="380" width="180" height="55" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="710" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Notification Svc :8005</text>
  <text x="710" y="422" text-anchor="middle" font-size="10" fill="#d1fae5">100 req/min per consumer</text>

  <!-- Arrows: gateway to services -->
  <line x1="500" y1="200" x2="620" y2="127" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="230" x2="620" y2="197" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="260" x2="620" y2="267" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="290" x2="620" y2="337" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="500" y1="320" x2="620" y2="407" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- Databases behind services -->
  <rect x="850" y="130" width="120" height="40" rx="6" fill="#6366f1" opacity="0.7"/>
  <text x="910" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">PostgreSQL</text>

  <rect x="850" y="250" width="120" height="40" rx="6" fill="#6366f1" opacity="0.7"/>
  <text x="910" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">PostgreSQL</text>

  <rect x="850" y="320" width="120" height="40" rx="6" fill="#6366f1" opacity="0.7"/>
  <text x="910" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Stripe API</text>

  <!-- Lines: services to DBs -->
  <line x1="800" y1="127" x2="850" y2="150" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="800" y1="267" x2="850" y2="270" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="800" y1="337" x2="850" y2="340" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="620" y="480" width="350" height="110" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="505" font-size="11" font-weight="600" fill="#1e293b">Rate Limit Strategy:</text>
  <rect x="640" y="515" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="660" y="526" font-size="10" fill="#475569">Global limit: 1000 req/min per IP (fallback)</text>
  <rect x="640" y="535" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="660" y="546" font-size="10" fill="#475569">Per-service limits (tuned per service capacity)</text>
  <rect x="640" y="555" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="660" y="566" font-size="10" fill="#475569">Per-consumer limits (free / pro / enterprise tiers)</text>
  <rect x="640" y="575" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="660" y="586" font-size="10" fill="#475569">Redis: shared counter store (atomic Lua scripts)</text>
</svg>
