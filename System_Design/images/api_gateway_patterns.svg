<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aPT" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="sPT" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="580" rx="18" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">API Gateway Architecture Patterns</text>

  <!-- ===== PATTERN 1: Single Gateway ===== -->
  <rect x="15" y="50" width="455" height="230" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1" filter="url(#sPT)"/>
  <text x="30" y="74" font-size="14" font-weight="700" fill="#a16207">Pattern 1: Single Gateway</text>
  <text x="30" y="90" font-size="10" fill="#92400e">One gateway for all clients — simple but can bottleneck</text>

  <rect x="30" y="104" width="80" height="60" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="70" y="130" text-anchor="middle" font-size="10" fill="#0369a1">📱 Mobile</text>
  <text x="70" y="145" text-anchor="middle" font-size="10" fill="#0369a1">🌐 Web</text>
  <text x="70" y="158" text-anchor="middle" font-size="10" fill="#0369a1">🔗 Partner</text>

  <line x1="110" y1="134" x2="155" y2="134" stroke="#475569" stroke-width="1.5" marker-end="url(#aPT)"/>

  <rect x="160" y="105" width="120" height="58" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="220" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">🚪 Single</text>
  <text x="220" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">API Gateway</text>

  <line x1="280" y1="120" x2="330" y2="112" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>
  <line x1="280" y1="134" x2="330" y2="134" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>
  <line x1="280" y1="148" x2="330" y2="156" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>

  <rect x="335" y="100" width="120" height="72" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="395" y="120" text-anchor="middle" font-size="10" fill="#166534">Service A</text>
  <text x="395" y="136" text-anchor="middle" font-size="10" fill="#166534">Service B</text>
  <text x="395" y="152" text-anchor="middle" font-size="10" fill="#166534">Service C</text>
  <text x="395" y="166" text-anchor="middle" font-size="9" fill="#15803d">...</text>

  <!-- Pros/Cons -->
  <text x="30" y="192" font-size="10" fill="#16a34a" font-weight="600">✅ Simple · One config</text>
  <text x="30" y="208" font-size="10" fill="#dc2626" font-weight="600">❌ Single point of failure</text>
  <text x="30" y="224" font-size="10" fill="#dc2626" font-weight="600">❌ Bottleneck at scale</text>
  <text x="30" y="240" font-size="10" fill="#64748b">Best for: &lt; 20 microservices</text>
  <text x="30" y="256" font-size="10" fill="#64748b">Tools: Kong, Nginx, AWS API Gateway</text>

  <!-- ===== PATTERN 2: BFF ===== -->
  <rect x="490" y="50" width="455" height="230" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" filter="url(#sPT)"/>
  <text x="505" y="74" font-size="14" font-weight="700" fill="#6d28d9">Pattern 2: Backend for Frontend (BFF)</text>
  <text x="505" y="90" font-size="10" fill="#7c3aed">Dedicated gateway per client type — optimized for each</text>

  <rect x="505" y="100" width="68" height="24" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="539" y="116" text-anchor="middle" font-size="10" fill="#0369a1">📱 Mobile</text>

  <rect x="505" y="132" width="68" height="24" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="539" y="148" text-anchor="middle" font-size="10" fill="#0369a1">🌐 Web</text>

  <rect x="505" y="164" width="68" height="24" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="539" y="180" text-anchor="middle" font-size="10" fill="#0369a1">🔗 Partner</text>

  <line x1="573" y1="112" x2="618" y2="112" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>
  <line x1="573" y1="144" x2="618" y2="144" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>
  <line x1="573" y1="176" x2="618" y2="176" stroke="#475569" stroke-width="1.2" marker-end="url(#aPT)"/>

  <rect x="623" y="98" width="110" height="28" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="678" y="116" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Mobile BFF GW</text>

  <rect x="623" y="130" width="110" height="28" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="678" y="148" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Web BFF GW</text>

  <rect x="623" y="162" width="110" height="28" rx="6" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="678" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Partner API GW</text>

  <line x1="733" y1="112" x2="800" y2="134" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="733" y1="144" x2="800" y2="144" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="733" y1="176" x2="800" y2="154" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>

  <rect x="805" y="118" width="120" height="52" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="865" y="138" text-anchor="middle" font-size="10" fill="#166534">Shared Services</text>
  <text x="865" y="154" text-anchor="middle" font-size="10" fill="#166534">A · B · C · ...</text>

  <text x="505" y="218" font-size="10" fill="#16a34a" font-weight="600">✅ Optimized per client · Independent deploys</text>
  <text x="505" y="234" font-size="10" fill="#dc2626" font-weight="600">❌ More infra · Some duplication</text>
  <text x="505" y="250" font-size="10" fill="#64748b">Best for: Multiple client types with different needs</text>
  <text x="505" y="266" font-size="10" fill="#64748b">Used by: Netflix, SoundCloud, Spotify</text>

  <!-- ===== PATTERN 3: Service Mesh ===== -->
  <rect x="15" y="295" width="455" height="270" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1" filter="url(#sPT)"/>
  <text x="30" y="319" font-size="14" font-weight="700" fill="#047857">Pattern 3: Service Mesh + Edge Gateway</text>
  <text x="30" y="335" font-size="10" fill="#059669">Sidecar proxy per service — decentralized traffic management</text>

  <rect x="30" y="348" width="68" height="24" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="64" y="364" text-anchor="middle" font-size="10" fill="#0369a1">Client</text>

  <line x1="98" y1="360" x2="138" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#aPT)"/>

  <rect x="143" y="345" width="100" height="32" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="193" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Edge Gateway</text>

  <line x1="243" y1="355" x2="285" y2="355" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="243" y1="365" x2="285" y2="400" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="243" y1="370" x2="285" y2="445" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>

  <!-- Sidecar + Service pairs -->
  <rect x="290" y="340" width="160" height="36" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="363" text-anchor="middle" font-size="9" fill="#047857">🔄 Envoy ↔ Service A</text>

  <rect x="290" y="385" width="160" height="36" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="408" text-anchor="middle" font-size="9" fill="#047857">🔄 Envoy ↔ Service B</text>

  <rect x="290" y="430" width="160" height="36" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="453" text-anchor="middle" font-size="9" fill="#047857">🔄 Envoy ↔ Service C</text>

  <!-- Inter-service arrows -->
  <line x1="370" y1="376" x2="370" y2="385" stroke="#059669" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="370" y1="421" x2="370" y2="430" stroke="#059669" stroke-width="1" marker-end="url(#aPT)"/>

  <text x="30" y="490" font-size="10" fill="#16a34a" font-weight="600">✅ Decentralized · No bottleneck · mTLS</text>
  <text x="30" y="506" font-size="10" fill="#dc2626" font-weight="600">❌ Complex setup · Extra latency per hop</text>
  <text x="30" y="522" font-size="10" fill="#64748b">Best for: 100+ services, strict security</text>
  <text x="30" y="538" font-size="10" fill="#64748b">Used by: Google, Lyft, Airbnb (Istio + Envoy)</text>

  <!-- ===== PATTERN 4: GraphQL Federation ===== -->
  <rect x="490" y="295" width="455" height="270" rx="12" fill="#fff1f2" stroke="#fda4af" stroke-width="1" filter="url(#sPT)"/>
  <text x="505" y="319" font-size="14" font-weight="700" fill="#be123c">Pattern 4: Federated GraphQL Gateway</text>
  <text x="505" y="335" font-size="10" fill="#e11d48">Single GraphQL endpoint federating across service subgraphs</text>

  <rect x="505" y="348" width="68" height="24" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="539" y="364" text-anchor="middle" font-size="10" fill="#0369a1">Client</text>

  <line x1="573" y1="360" x2="618" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#aPT)"/>

  <rect x="623" y="342" width="140" height="40" rx="10" fill="#ffe4e6" stroke="#fb7185" stroke-width="2"/>
  <text x="693" y="359" text-anchor="middle" font-size="10" font-weight="700" fill="#be123c">Apollo Gateway</text>
  <text x="693" y="374" text-anchor="middle" font-size="9" fill="#e11d48">Supergraph</text>

  <line x1="763" y1="352" x2="808" y2="352" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="763" y1="362" x2="808" y2="400" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>
  <line x1="763" y1="372" x2="808" y2="445" stroke="#475569" stroke-width="1" marker-end="url(#aPT)"/>

  <rect x="813" y="338" width="120" height="30" rx="6" fill="#fff" stroke="#fda4af" stroke-width="1"/>
  <text x="873" y="358" text-anchor="middle" font-size="9" fill="#be123c">User Subgraph</text>

  <rect x="813" y="385" width="120" height="30" rx="6" fill="#fff" stroke="#fda4af" stroke-width="1"/>
  <text x="873" y="405" text-anchor="middle" font-size="9" fill="#be123c">Order Subgraph</text>

  <rect x="813" y="432" width="120" height="30" rx="6" fill="#fff" stroke="#fda4af" stroke-width="1"/>
  <text x="873" y="452" text-anchor="middle" font-size="9" fill="#be123c">Product Subgraph</text>

  <!-- Sample query -->
  <rect x="505" y="398" width="280" height="72" rx="6" fill="#fff5f5" stroke="#fecdd3" stroke-width="0.8"/>
  <text x="515" y="414" font-size="9" font-weight="600" fill="#881337">query {</text>
  <text x="525" y="428" font-size="9" fill="#9f1239">user(id: "123") {</text>
  <text x="535" y="442" font-size="9" fill="#9f1239">name, orders { id, items { productName } }</text>
  <text x="525" y="456" font-size="9" fill="#9f1239">}</text>
  <text x="515" y="466" font-size="9" font-weight="600" fill="#881337">}</text>

  <text x="505" y="490" font-size="10" fill="#16a34a" font-weight="600">✅ Client gets exactly what it needs · 1 request</text>
  <text x="505" y="506" font-size="10" fill="#dc2626" font-weight="600">❌ Complex caching · N+1 query risk</text>
  <text x="505" y="522" font-size="10" fill="#64748b">Best for: Frontend-driven, flexible data needs</text>
  <text x="505" y="538" font-size="10" fill="#64748b">Used by: GitHub, Shopify, Netflix</text>
</svg>