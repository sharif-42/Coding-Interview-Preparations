<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="aA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="960" height="480" rx="12" fill="url(#bgG)"/>
  <text x="480" y="35" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">Caching Overview — Cache Hit vs Cache Miss</text>

  <!-- ===== CACHE HIT PATH (top) ===== -->
  <text x="480" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">Cache Hit (~1-2ms)</text>

  <!-- Client -->
  <rect x="40" y="90" width="140" height="65" rx="10" fill="#3b82f6"/>
  <text x="110" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Client</text>
  <text x="110" y="138" text-anchor="middle" font-size="9" fill="#dbeafe">GET /api/products/123</text>

  <!-- Arrow: Client to Server -->
  <line x1="180" y1="122" x2="270" y2="122" stroke="#3b82f6" stroke-width="2" marker-end="url(#aB)"/>

  <!-- Server -->
  <rect x="270" y="90" width="140" height="65" rx="10" fill="#f59e0b"/>
  <text x="340" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">API Server</text>
  <text x="340" y="138" text-anchor="middle" font-size="9" fill="#fef3c7">Django / FastAPI</text>

  <!-- Arrow: Server to Cache -->
  <line x1="410" y1="122" x2="520" y2="122" stroke="#f59e0b" stroke-width="2" marker-end="url(#aA)"/>
  <text x="465" y="112" text-anchor="middle" font-size="9" fill="#475569">1. Check cache</text>

  <!-- Cache (Redis) -->
  <rect x="520" y="85" width="160" height="75" rx="10" fill="#dc2626"/>
  <text x="600" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Redis Cache</text>
  <text x="600" y="135" text-anchor="middle" font-size="10" fill="#fecaca">product:123 = {...}</text>
  <text x="600" y="148" text-anchor="middle" font-size="9" fill="#fecaca">TTL: 247s remaining</text>

  <!-- Arrow: Cache returns (HIT) -->
  <line x1="520" y1="140" x2="410" y2="140" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)"/>
  <text x="465" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">2. HIT! Return data</text>

  <!-- Arrow: Server returns to client -->
  <line x1="270" y1="140" x2="180" y2="140" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)"/>

  <!-- HIT badge -->
  <rect x="750" y="95" width="160" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="830" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">CACHE HIT</text>
  <text x="830" y="137" text-anchor="middle" font-size="10" fill="#166534">~1-2ms response</text>

  <!-- ===== CACHE MISS PATH (bottom) ===== -->
  <text x="480" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Cache Miss (~50-200ms)</text>

  <!-- Client -->
  <rect x="40" y="230" width="140" height="65" rx="10" fill="#3b82f6"/>
  <text x="110" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Client</text>
  <text x="110" y="278" text-anchor="middle" font-size="9" fill="#dbeafe">GET /api/products/456</text>

  <!-- Arrow: Client to Server -->
  <line x1="180" y1="262" x2="270" y2="262" stroke="#3b82f6" stroke-width="2" marker-end="url(#aB)"/>

  <!-- Server -->
  <rect x="270" y="230" width="140" height="65" rx="10" fill="#f59e0b"/>
  <text x="340" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">API Server</text>
  <text x="340" y="278" text-anchor="middle" font-size="9" fill="#fef3c7">Django / FastAPI</text>

  <!-- Arrow: Server to Cache (check) -->
  <line x1="410" y1="252" x2="520" y2="252" stroke="#f59e0b" stroke-width="2" marker-end="url(#aA)"/>
  <text x="465" y="242" text-anchor="middle" font-size="9" fill="#475569">1. Check cache</text>

  <!-- Cache (Redis) - MISS -->
  <rect x="520" y="230" width="160" height="65" rx="10" fill="#dc2626" opacity="0.3"/>
  <rect x="520" y="230" width="160" height="65" rx="10" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="600" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Redis Cache</text>
  <text x="600" y="278" text-anchor="middle" font-size="10" fill="#991b1b">product:456 = NOT FOUND</text>

  <!-- Arrow: Cache returns MISS -->
  <line x1="520" y1="272" x2="410" y2="272" stroke="#dc2626" stroke-width="2" marker-end="url(#aR)"/>
  <text x="465" y="288" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">2. MISS</text>

  <!-- Arrow: Server to Database -->
  <line x1="340" y1="295" x2="340" y2="340" stroke="#6366f1" stroke-width="2" marker-end="url(#aP)"/>
  <text x="380" y="320" font-size="9" fill="#475569">3. Query DB</text>

  <!-- Database -->
  <rect x="270" y="340" width="140" height="60" rx="10" fill="#6366f1"/>
  <text x="340" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">PostgreSQL</text>
  <text x="340" y="385" text-anchor="middle" font-size="9" fill="#e0e7ff">SELECT * FROM products</text>

  <!-- Arrow: DB returns data -->
  <line x1="410" y1="370" x2="520" y2="322" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#aP)"/>
  <text x="485" y="335" font-size="9" fill="#475569">4. Store in cache</text>

  <!-- Cache being populated -->
  <rect x="520" y="310" width="160" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="600" y="332" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Cache populated</text>
  <text x="600" y="348" text-anchor="middle" font-size="9" fill="#166534">product:456 = {...} TTL:300s</text>

  <!-- Arrow: Server returns to client -->
  <line x1="270" y1="370" x2="150" y2="295" stroke="#3b82f6" stroke-width="2" marker-end="url(#aB)"/>
  <text x="195" y="320" font-size="9" fill="#475569">5. Return data</text>

  <!-- MISS badge -->
  <rect x="750" y="245" width="160" height="55" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="830" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">CACHE MISS</text>
  <text x="830" y="287" text-anchor="middle" font-size="10" fill="#991b1b">~50-200ms response</text>

  <!-- Legend -->
  <rect x="40" y="420" width="880" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="448" font-size="10" fill="#334155">Next request for product:456 will be a</text>
  <text x="298" y="448" font-size="10" font-weight="700" fill="#10b981">CACHE HIT</text>
  <text x="372" y="448" font-size="10" fill="#334155">(~1-2ms) because it was stored in Step 4. This is the</text>
  <text x="676" y="448" font-size="10" font-weight="700" fill="#f59e0b">Cache-Aside</text>
  <text x="751" y="448" font-size="10" fill="#334155">pattern (lazy loading).</text>
</svg>
